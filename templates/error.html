<!DOCTYPE html>
<html lang="en" data-theme="{{ current_user.theme if current_user else 'dark' }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ code }} — DUYS Boost</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div style="min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center">
  <div style="max-width:420px;width:100%">
    <div style="font-family:var(--font-display);font-size:clamp(72px,20vw,120px);font-weight:800;background:var(--gradient-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1">
      {{ code }}
    </div>
    <h1 style="font-size:clamp(20px,5vw,26px);margin:12px 0">{{ message }}</h1>
    <p style="color:var(--muted);margin-bottom:24px;font-size:14.5px;line-height:1.6">
      {% if code == 404 %}The page you're looking for doesn't exist or was moved.
      {% else %}Our team has been notified. Please try again in a moment.{% endif %}
    </p>
    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">Back to Home</a>
  </div>
</div>
</body>
</html>
