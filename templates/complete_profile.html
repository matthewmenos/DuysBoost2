<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>Complete Profile — DUYS Boost</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  min-height: 100vh;
  background: #080a12;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-body, system-ui, sans-serif);
  overflow-x: hidden; position: relative;
}
.orb {
  position: fixed; border-radius: 50%; filter: blur(80px);
  opacity: 0.5; pointer-events: none; z-index: 0;
}
.orb-1 { width: 500px; height: 500px; background: radial-gradient(circle,#7f5af0,transparent 70%); top:-120px; left:-80px; }
.orb-2 { width: 380px; height: 380px; background: radial-gradient(circle,#2cb67d,transparent 70%); bottom:-80px; right:-60px; }
.glass-wrap { position: relative; z-index: 10; width: 100%; max-width: 460px; padding: 16px; }
.glass-card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(32px) saturate(1.6);
  -webkit-backdrop-filter: blur(32px) saturate(1.6);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 24px; padding: 36px 32px 32px;
  box-shadow: 0 32px 80px rgba(0,0,0,.55), 0 8px 24px rgba(127,90,240,.12);
}
.field-label { display: block; font-size: 11.5px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  color: rgba(255,255,255,.45); margin-bottom: 6px; }
.field-input {
  width: 100%; padding: 11px 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 11px; color: #fff; font-size: 14px;
  font-family: inherit; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.field-input:focus { border-color: rgba(127,90,240,.7); box-shadow: 0 0 0 3px rgba(127,90,240,.15); }
.field-input::placeholder { color: rgba(255,255,255,.25); }
.auth-submit {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg,#7f5af0,#5a3fc0);
  border: none; border-radius: 12px; color: #fff;
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; box-shadow: 0 4px 20px rgba(127,90,240,.4);
  transition: opacity .2s;
}
.auth-submit:hover { opacity: .9; }
.auth-submit:disabled { opacity: .55; cursor: not-allowed; }
.error-box {
  background: rgba(239,69,101,.1); border: 1px solid rgba(239,69,101,.3);
  border-radius: 10px; padding: 10px 14px; display: none; margin-bottom: 14px;
}
.error-box.show { display: block; }
.error-box li { color: #ff7c9c; font-size: 13px; list-style: none; padding: 2px 0; }
.email-pill {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
  border-radius: 99px; padding: 6px 14px; font-size: 13px;
  color: rgba(255,255,255,.7); margin-bottom: 22px;
}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="glass-wrap">
  <div class="glass-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:52px;height:52px;background:linear-gradient(135deg,#7f5af0,#5a3fc0);
                  border-radius:14px;display:inline-flex;align-items:center;justify-content:center;
                  font-size:24px;margin-bottom:12px;box-shadow:0 4px 20px rgba(127,90,240,.4)">⚡</div>
      <div style="font-size:20px;font-weight:800;color:#fff;letter-spacing:-.02em">One last step</div>
      <div style="font-size:13px;color:rgba(255,255,255,.45);margin-top:4px">
        Set up your profile to finish signing in with {{ provider }}
      </div>
    </div>

    <div style="text-align:center">
      <span class="email-pill">📧 {{ email }}</span>
    </div>

    <div class="error-box" id="cp-error"><ul></ul></div>

    <form id="cp-form" novalidate style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label class="field-label">Display name</label>
        <input class="field-input" name="display_name" id="cp-display"
               value="{{ suggested_name }}" autocomplete="name"
               placeholder="How others see you" maxlength="60" required>
      </div>
      <div>
        <label class="field-label">Username</label>
        <input class="field-input" name="username" id="cp-username"
               autocomplete="username" placeholder="cooluser"
               minlength="3" maxlength="30" required>
        <div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:5px">
          Letters, numbers, _ and - only
        </div>
      </div>
      <div>
        <label class="field-label">
          Referral code
          <span style="font-size:10px;background:rgba(255,255,255,.07);
                       border:1px solid rgba(255,255,255,.1);padding:1px 7px;
                       border-radius:99px;color:rgba(255,255,255,.4);margin-left:4px">optional</span>
        </label>
        <input class="field-input" name="referral_code" placeholder="abc123" maxlength="20">
      </div>
      <button type="submit" class="auth-submit" id="cp-btn">
        Create my account →
      </button>
    </form>

    <div style="text-align:center;margin-top:18px">
      <a href="{{ url_for('auth.logout') }}"
         style="font-size:12px;color:rgba(255,255,255,.3);text-decoration:none">
        Cancel &amp; sign out
      </a>
    </div>
  </div>
</div>

<script>
const CSRF = document.querySelector('meta[name="csrf-token"]')?.content || '';

// Pre-fill username from display name
const dn = document.getElementById('cp-display');
const un = document.getElementById('cp-username');
if (dn && un) {
  dn.addEventListener('input', () => {
    if (!un._touched)
      un.value = dn.value.replace(/[^A-Za-z0-9_-]/g,'').toLowerCase().slice(0,20);
  });
  un.addEventListener('input', () => { un._touched = true; });
}

document.getElementById('cp-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('cp-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  document.getElementById('cp-error').classList.remove('show');

  const fd = new FormData(this);
  const r  = await fetch('{{ url_for("auth.complete_profile") }}', {
    method: 'POST',
    headers: { 'X-CSRF-Token': CSRF },
    body: fd,
  }).catch(() => null);

  if (!r) {
    btn.disabled = false; btn.textContent = 'Create my account →';
    showErr(['Network error.']); return;
  }
  const d = await r.json();
  if (d.success) { location.href = d.redirect; }
  else {
    showErr(d.errors || ['Please check your entries.']);
    btn.disabled = false; btn.textContent = 'Create my account →';
  }
});

function showErr(errs) {
  const box = document.getElementById('cp-error');
  box.querySelector('ul').innerHTML = errs.map(e => `<li>⚠ ${e}</li>`).join('');
  box.classList.add('show');
}
</script>
</body>
</html>
