{% if current_user %}
<!-- ── Stories bar ───────────────────────────────────────────────────────── -->
<style>
.stories-bar {
  display: flex;
  gap: 14px;
  padding: 14px 16px 10px;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.stories-bar::-webkit-scrollbar { display: none; }

.story-bubble {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  flex-shrink: 0;
  min-width: 60px;
}
.story-ring {
  width: 58px; height: 58px;
  border-radius: 50%;
  padding: 2.5px;
  background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
}
.story-ring.seen {
  background: var(--border);
}
.story-ring.own {
  background: var(--accent);
}
.story-ring-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  border: 2.5px solid var(--surface);
  overflow: hidden;
  background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.story-ring-inner img {
  width: 100%; height: 100%; object-fit: cover;
}
.story-add-btn {
  width: 58px; height: 58px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 2px dashed var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  cursor: pointer;
  transition: background var(--transition);
}
.story-add-btn:hover { background: rgba(127,90,240,.1); }
.story-username {
  font-size: 11.5px;
  color: var(--text-dim);
  max-width: 60px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Story viewer overlay ───────────────────────────────────────────────── */
.story-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: #000;
  display: none;
  flex-direction: column;
}
.story-overlay.open { display: flex; }
.story-progress-bar {
  display: flex;
  gap: 4px;
  padding: 10px 12px 6px;
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
}
.story-progress-seg {
  flex: 1;
  height: 2.5px;
  background: rgba(255,255,255,.3);
  border-radius: 2px;
  overflow: hidden;
}
.story-progress-fill {
  height: 100%;
  background: #fff;
  width: 0%;
  transition: width linear;
}
.story-progress-fill.done { width: 100%; }
.story-header {
  position: absolute;
  top: 22px; left: 0; right: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  z-index: 10;
}
.story-author-info {
  display: flex; align-items: center; gap: 9px; flex: 1;
}
.story-author-info .avatar { width: 36px; height: 36px; }
.story-author-name { color: #fff; font-weight: 700; font-size: 14px; }
.story-time { color: rgba(255,255,255,.7); font-size: 12px; }
.story-close-btn {
  background: none; border: none; color: #fff; font-size: 22px;
  cursor: pointer; padding: 4px; line-height: 1;
}
.story-delete-btn {
  background: none; border: none; color: rgba(255,255,255,.8); font-size: 18px;
  cursor: pointer; padding: 4px;
}
.story-media {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.story-media img, .story-media video {
  max-width: 100%;
  max-height: 100vh;
  object-fit: contain;
}
.story-caption {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 24px 16px 28px;
  background: linear-gradient(transparent, rgba(0,0,0,.7));
  color: #fff;
  font-size: 15px;
  text-align: center;
}
.story-nav-btn {
  position: absolute;
  top: 0; bottom: 0;
  width: 35%;
  background: none;
  border: none;
  cursor: pointer;
  z-index: 5;
}
.story-nav-prev { left: 0; }
.story-nav-next { right: 0; }
</style>

<!-- Stories bar HTML -->
<div class="stories-bar" id="stories-bar">
  <!-- Add own story -->
  <div class="story-bubble" onclick="document.getElementById('story-upload-input').click()">
    <div class="story-add-btn">＋</div>
    <span class="story-username">Your story</span>
  </div>
  <!-- Story bubbles populated by JS -->
  <span id="stories-loading" style="display:none;align-self:center;color:var(--muted);font-size:13px">Loading…</span>
</div>

<!-- Hidden file input for story upload -->
<input type="file" id="story-upload-input" accept="image/*,video/mp4,video/webm"
       style="display:none" onchange="uploadStory(this)">

<!-- Story viewer overlay -->
<div class="story-overlay" id="story-overlay">
  <div class="story-progress-bar" id="story-progress"></div>
  <div class="story-header">
    <div class="story-author-info">
      <div class="avatar story-author-avatar" id="sv-avatar"></div>
      <div>
        <div class="story-author-name" id="sv-name"></div>
        <div class="story-time" id="sv-time"></div>
      </div>
    </div>
    <button class="story-viewers-btn" id="sv-viewers-btn" style="display:none"
            onclick="openViewers()" title="See viewers" aria-label="Story viewers"
            style="background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;
                   display:flex;align-items:center;gap:5px;font-size:13px;padding:4px 8px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <span id="sv-view-count-badge">0</span>
    </button>
    <button class="story-delete-btn" id="sv-delete" style="display:none"
            onclick="deleteCurrentStory()" title="Delete story">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </button>
    <button class="story-pause-btn" id="sv-pause-btn" onclick="toggleStoryPause()" aria-label="Pause / Play" title="Pause / Play">
      <svg id="sv-pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <button class="story-close-btn" onclick="closeStoryViewer()"><svg class="i-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="story-media" id="sv-media"></div>
  <!-- Pause badge overlay -->
  <div class="sv-pause-badge" id="sv-pause-badge" style="display:none">
    <div class="sv-pause-icon" id="sv-pause-icon-wrap">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
           id="sv-pause-badge-svg">
        <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
      </svg>
    </div>
  </div>
  <div class="story-caption" id="sv-caption" style="display:none"></div>
  <button class="story-nav-btn story-nav-prev" onclick="prevStory()"></button>
  <button class="story-nav-btn story-nav-next" onclick="nextStory()"></button>

  <!-- Bottom bar: Instagram-style ❤️ react button (non-owners only) -->
  <div class="sv-bottom-bar" id="sv-bottom-bar" style="display:none">
    <button class="sv-heart-btn" id="sv-heart-btn"
            aria-label="React with ❤️"
            title="Tap to react · Hold for more">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round" id="sv-heart-svg">
        <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
      </svg>
    </button>
  </div>

  <!-- Viewers bottom sheet (owner only) -->
  <div class="story-viewers-sheet" id="sv-viewers-sheet">
    <div class="story-viewers-handle" onclick="closeViewers()"></div>
    <div style="padding:0 16px 8px;display:flex;align-items:center;justify-content:space-between">
      <span style="color:#fff;font-weight:700;font-size:15px">Viewers</span>
      <span id="sv-viewer-count" style="color:rgba(255,255,255,.6);font-size:13px"></span>
    </div>
    <div id="sv-viewers-list"></div>
  </div>
</div>

<!-- Story upload caption modal -->
<div class="modal-overlay" id="story-caption-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <div class="modal-title">Add a caption</div>
      <button class="modal-close" onclick="closeModal('story-caption-modal')"><svg class="i-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div id="story-preview-wrap" style="text-align:center;margin-bottom:12px">
      <img id="story-preview-img" style="max-width:100%;max-height:220px;border-radius:8px;display:none">
      <video id="story-preview-video" style="max-width:100%;max-height:220px;border-radius:8px;display:none" muted playsinline></video>
    </div>
    <textarea class="form-input" id="story-caption-input"
              placeholder="Caption (optional)…" rows="2" maxlength="200"
              style="margin-bottom:12px"></textarea>
    <button class="btn btn-primary btn-block" onclick="submitStory()">Post story</button>
  </div>
</div>

<script>
/* ── Story state ─────────────────────────────────────────────────────────── */
let _storyGroups     = [];
let _svGroupIdx      = 0;
let _svStoryIdx      = 0;
let _svTimer         = null;
let _svDuration      = 5000;
let _svPendingFile   = null;
let _svPendingData   = null;
let _svPendingMime   = null;

/* ── Load stories feed ───────────────────────────────────────────────────── */
async function loadStories() {
  try {
    const r = await fetch('/api/stories/feed');
    const d = await r.json();
    _storyGroups = d.groups || [];
    renderStoryBar();
  } catch (_) {}
}
loadStories();

function renderStoryBar() {
  const bar = document.getElementById('stories-bar');
  // Keep the "add" button (first child) — may be replaced below if user has stories
  while (bar.children.length > 1) bar.removeChild(bar.lastChild);

  // Check if the current user has their own stories
  const ownGrpIdx = _storyGroups.findIndex(function(g) { return g.is_own; });
  const ownGrp    = ownGrpIdx >= 0 ? _storyGroups[ownGrpIdx] : null;

  if (ownGrp) {
    // Replace the "+" button with the user's own story ring
    const addBtn = bar.firstElementChild;
    if (addBtn) {
      addBtn.onclick = function() { openStoryGroup(ownGrpIdx); };
      const imgTag = ownGrp.avatar_url
        ? `<img src="${ownGrp.avatar_url}" alt="">`
        : `<span>${(ownGrp.display_name||ownGrp.username||'?')[0].toUpperCase()}</span>`;
      addBtn.innerHTML = `
        <div class="story-ring own">
          <div class="story-ring-inner">${imgTag}</div>
        </div>
        <span class="story-username">Your story</span>`;
    }
  }

  _storyGroups.forEach(function(grp, gi) {
    if (grp.is_own) return; // already handled as the first bubble
    const bubble = document.createElement('div');
    bubble.className = 'story-bubble';
    bubble.onclick   = function() { openStoryGroup(gi); };

    const allSeen   = !grp.has_unseen;
    const ringClass = allSeen ? 'seen' : '';
    const imgTag    = grp.avatar_url
      ? `<img src="${grp.avatar_url}" alt="">`
      : `<span>${(grp.display_name||grp.username||'?')[0].toUpperCase()}</span>`;

    bubble.innerHTML = `
      <div class="story-ring ${ringClass}">
        <div class="story-ring-inner">${imgTag}</div>
      </div>
      <span class="story-username" style="display:flex;align-items:center;gap:2px">${escapeHtml(grp.display_name||grp.username)}${grp.is_verified ? '<span class="badge-verified tier-'+(grp.verified_tier||'blue')+'" style="width:13px;height:13px"><svg class="badge-shell" viewBox="0 0 22 22" fill="currentColor"><path d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568-.54.354-.969.854-1.24 1.44-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567.539-.354.969-.854 1.24-1.44.608.222 1.267.272 1.902.14.635-.13 1.22-.436 1.69-.882.445-.47.749-1.055.878-1.688.13-.633.08-1.29-.144-1.896.587-.274 1.087-.705 1.443-1.245.356-.54.555-1.17.574-1.817z"/></svg><svg class="badge-check" viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 5.5 4.2 7.5 8 3"/></svg></span>' : ''}</span>`;
    bar.appendChild(bubble);
  });
}

/* ── Story viewer ────────────────────────────────────────────────────────── */
function openStoryGroup(groupIdx, storyIdx) {
  _svGroupIdx = groupIdx;
  _svStoryIdx = storyIdx || 0;
  document.getElementById('story-overlay').classList.add('open');
  document.body.classList.add('no-scroll');
  _showCurrentStory();
}
window.openStoryGroup = openStoryGroup;

let _svPaused    = false;
let _svPausedAt  = 0;   // progress-bar width (%) at time of pause
let _svPauseTime = 0;   // timestamp when pause started

/* Apply or lift the paused state without restarting the story */
function _applyPauseState() {
  const vid   = document.querySelector('#sv-media video');
  const badge = document.getElementById('sv-pause-badge');
  const fill  = document.getElementById('spf-' + _svStoryIdx);
  const pBtn  = document.getElementById('sv-pause-icon');

  if (_svPaused) {
    clearTimeout(_svTimer);
    /* Freeze progress bar at current width */
    if (fill && fill.parentElement) {
      const w  = fill.getBoundingClientRect().width;
      const pw = fill.parentElement.getBoundingClientRect().width || 1;
      _svPausedAt = Math.min(100, (w / pw) * 100);
      fill.style.transition = 'none';
      fill.style.width      = _svPausedAt + '%';
    }
    if (vid) vid.pause();
    if (badge) badge.style.display = 'flex';
    /* Switch header icon to "play" triangle */
    if (pBtn) pBtn.innerHTML = '<polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/>';
  } else {
    if (vid) vid.play().catch(function(){});
    if (badge) badge.style.display = 'none';
    /* Switch header icon back to "pause" bars */
    if (pBtn) pBtn.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    /* Resume progress bar for remaining duration */
    const remaining = Math.max(200, _svDuration * (1 - _svPausedAt / 100));
    if (fill) {
      fill.style.transition = 'width ' + remaining + 'ms linear';
      setTimeout(function() { fill.style.width = '100%'; }, 20);
    }
    _svTimer = setTimeout(function() { nextStory(); }, remaining);
  }
}

function toggleStoryPause() {
  _svPaused = !_svPaused;
  _applyPauseState();
}
window.toggleStoryPause = toggleStoryPause;

function _showCurrentStory() {
  _svPaused   = false;
  _svPausedAt = 0;
  clearTimeout(_svTimer);
  /* Reset pause badge and header icon */
  const badge = document.getElementById('sv-pause-badge');
  if (badge) badge.style.display = 'none';
  const pBtn = document.getElementById('sv-pause-icon');
  if (pBtn) pBtn.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  const grp    = _storyGroups[_svGroupIdx];
  const story  = grp && grp.stories[_svStoryIdx];
  if (!story) { closeStoryViewer(); return; }

  // Header
  const avEl = document.getElementById('sv-avatar');
  avEl.innerHTML = grp.avatar_url
    ? `<img src="${grp.avatar_url}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    : `<span style="color:#fff">${(grp.display_name||grp.username||'?')[0].toUpperCase()}</span>`;
  avEl.style.background = 'var(--accent)';
  avEl.style.display    = 'flex';
  avEl.style.alignItems = 'center';
  avEl.style.justifyContent = 'center';

  var _grpName = grp.display_name || grp.username || '';
  if (grp.is_verified) {
    var _gt = grp.verified_tier || 'blue';
    document.getElementById('sv-name').innerHTML = escapeHtml(_grpName)
      + '<span class="badge-verified tier-' + _gt + '" style="margin-left:3px;width:16px;height:16px;vertical-align:middle">'
      + '<svg class="badge-shell" viewBox="0 0 22 22" fill="currentColor"><path d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568-.54.354-.969.854-1.24 1.44-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567.539-.354.969-.854 1.24-1.44.608.222 1.267.272 1.902.14.635-.13 1.22-.436 1.69-.882.445-.47.749-1.055.878-1.688.13-.633.08-1.29-.144-1.896.587-.274 1.087-.705 1.443-1.245.356-.54.555-1.17.574-1.817z"/></svg>'
      + '<svg class="badge-check" viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 5.5 4.2 7.5 8 3"/></svg>'
      + '</span>';
  } else {
    document.getElementById('sv-name').textContent = _grpName;
  }
  document.getElementById('sv-time').textContent = story.hours_left + 'h left';
  document.getElementById('sv-delete').style.display = story.is_own ? '' : 'none';
  document.getElementById('sv-delete').dataset.storyId = story.id;
  const vBtn = document.getElementById('sv-viewers-btn');
  if (vBtn) {
    vBtn.style.display = story.is_own ? 'flex' : 'none';
    const badge = document.getElementById('sv-view-count-badge');
    if (badge) badge.textContent = story.view_count || 0;
  }
  // Close viewers sheet if open
  const sheet = document.getElementById('sv-viewers-sheet');
  if (sheet) sheet.classList.remove('open');
  // Show Instagram-style bottom bar for non-owners
  const bbar = document.getElementById('sv-bottom-bar');
  if (bbar) {
    const isOwn = story && story.is_own;
    bbar.style.display = isOwn ? 'none' : 'flex';
    const hBtn = document.getElementById('sv-heart-btn');
    if (hBtn) {
      hBtn.dataset.storyId = story.id;
      hBtn.classList.remove('reacted', 'heartpop');
    }
  }

  // Media — infer type from mime or URL extension
  const mediaEl = document.getElementById('sv-media');
  const mime = story.media_mime || '';
  const url  = story.media_url  || '';
  const isVideo = mime.startsWith('video/') ||
    /\.(mp4|webm|ogv|mov)(\?|$)/i.test(url);
  if (isVideo) {
    mediaEl.innerHTML = `<video src="${url}" autoplay muted playsinline controls
      style="max-width:100%;max-height:100vh;object-fit:contain"></video>`;
    const vid = mediaEl.querySelector('video');
    vid.onerror = () => {
      mediaEl.innerHTML = `<div style="color:#fff;text-align:center;padding:32px">
        ⚠️ Could not load video.<br><a href="${url}" target="_blank"
        style="color:#a78bfa">Open directly</a></div>`;
    };
    vid.onloadedmetadata = function() { _svDuration = Math.min(vid.duration * 1000, 30000); };
  } else {
    mediaEl.innerHTML = `<img src="${url}" alt=""
      style="max-width:100%;max-height:100vh;object-fit:contain"
      onerror="this.alt='Image failed to load'; this.style.padding='32px';">`;
    _svDuration = 5000;
  }

  // Caption
  const capEl = document.getElementById('sv-caption');
  if (story.caption) { capEl.textContent = story.caption; capEl.style.display = ''; }
  else { capEl.style.display = 'none'; }

  // Progress bars
  const total    = grp.stories.length;
  const progEl   = document.getElementById('story-progress');
  progEl.innerHTML = grp.stories.map(function(_, i) {
    const fill = i < _svStoryIdx ? 'done' : (i === _svStoryIdx ? 'active' : '');
    return `<div class="story-progress-seg"><div class="story-progress-fill ${fill}"
      style="${fill==='active'?'transition:width '+_svDuration+'ms linear':''}"
      id="spf-${i}"></div></div>`;
  }).join('');

  // Animate current bar
  setTimeout(function() {
    const active = document.getElementById('spf-' + _svStoryIdx);
    if (active) active.style.width = '100%';
  }, 50);

  // Mark viewed
  fetch('/api/story/' + story.id + '/view', { method: 'POST' }).catch(function(){});

  // Auto-advance
  _svTimer = setTimeout(function() { nextStory(); }, _svDuration);
}

function nextStory() {
  clearTimeout(_svTimer);
  const grp = _storyGroups[_svGroupIdx];
  if (grp && _svStoryIdx < grp.stories.length - 1) {
    _svStoryIdx++;
    _showCurrentStory();
  } else if (_svGroupIdx < _storyGroups.length - 1) {
    _svGroupIdx++;
    _svStoryIdx = 0;
    _showCurrentStory();
  } else {
    closeStoryViewer();
  }
}
function prevStory() {
  clearTimeout(_svTimer);
  if (_svStoryIdx > 0) {
    _svStoryIdx--;
    _showCurrentStory();
  } else if (_svGroupIdx > 0) {
    _svGroupIdx--;
    _svStoryIdx = (_storyGroups[_svGroupIdx].stories.length - 1) || 0;
    _showCurrentStory();
  }
}
function closeStoryViewer() {
  clearTimeout(_svTimer);
  document.getElementById('story-overlay').classList.remove('open');
  document.body.classList.remove('no-scroll');
  document.getElementById('sv-media').innerHTML = '';
}
window.nextStory     = nextStory;
window.prevStory     = prevStory;
window.closeStoryViewer = closeStoryViewer;

/* ── Delete story ────────────────────────────────────────────────────────── */
async function deleteCurrentStory() {
  const btn = document.getElementById('sv-delete');
  const sid = btn.dataset.storyId;
  if (!sid || !confirm('Delete this story?')) return;
  try {
    const r = await fetch('/api/story/' + sid, { method: 'DELETE' });
    const d = await r.json();
    if (d.success) {
      showToast('Story deleted.');
      // Remove from local state
      const grp = _storyGroups[_svGroupIdx];
      if (grp) {
        grp.stories.splice(_svStoryIdx, 1);
        if (!grp.stories.length) {
          _storyGroups.splice(_svGroupIdx, 1);
          renderStoryBar();
          closeStoryViewer();
        } else {
          _svStoryIdx = Math.min(_svStoryIdx, grp.stories.length - 1);
          renderStoryBar();
          _showCurrentStory();
        }
      }
    } else {
      showToast(d.error || 'Could not delete story.', 'error');
    }
  } catch (_) { showToast('Network error.', 'error'); }
}
window.deleteCurrentStory = deleteCurrentStory;

/* ── Upload story ────────────────────────────────────────────────────────── */
function uploadStory(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 25 * 1024 * 1024) {
    showToast('File too large (max 25 MB).', 'error');
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    _svPendingData = e.target.result;
    _svPendingMime = file.type;
    // Show preview + caption modal
    const img = document.getElementById('story-preview-img');
    const vid = document.getElementById('story-preview-video');
    if (file.type.startsWith('video/')) {
      vid.src = e.target.result; vid.style.display = '';
      img.style.display = 'none';
    } else {
      img.src = e.target.result; img.style.display = '';
      vid.style.display = 'none';
    }
    document.getElementById('story-caption-input').value = '';
    openModal('story-caption-modal');
  };
  reader.readAsDataURL(file);
  input.value = '';
}
window.uploadStory = uploadStory;

async function submitStory() {
  if (!_svPendingData) return;
  const caption = document.getElementById('story-caption-input').value.trim();
  const postBtn = document.querySelector('#story-caption-modal .btn-primary');
  if (postBtn) { postBtn.disabled = true; postBtn.textContent = 'Posting…'; }

  const fd = new FormData();
  fd.append('media_data', _svPendingData);
  fd.append('media_mime', _svPendingMime || 'image/jpeg');
  if (caption) fd.append('caption', caption);

  try {
    const r = await fetch('/api/story/create', { method: 'POST', body: fd });
    let d;
    if (!r.ok && r.status === 403) {
      d = { success: false, error: 'Session expired — please log in again.' };
    } else {
      const raw = await r.text();
      try { d = JSON.parse(raw); }
      catch (_) { d = { success: false, error: 'Upload failed (HTTP ' + r.status + '). Check R2 config.' }; }
    }

    if (d.success) {
      closeModal('story-caption-modal');
      showToast('Story posted! 🎉');
      _svPendingData = null;
      _svPendingMime = null;
      loadStories();
    } else {
      if (postBtn) { postBtn.disabled = false; postBtn.textContent = 'Post story'; }
      showToast(d.error || 'Could not post story.', 'error');
    }
  } catch (err) {
    if (postBtn) { postBtn.disabled = false; postBtn.textContent = 'Post story'; }
    showToast('Network error: ' + err.message, 'error');
  }
}
window.submitStory = submitStory;

// Close overlay on backdrop click (but not on media)
document.getElementById('story-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeStoryViewer();
});

/* ── Story viewers ───────────────────────────────────────────────────────── */
async function openViewers() {
  const grp   = _storyGroups[_svGroupIdx];
  const story = grp && grp.stories[_svStoryIdx];
  if (!story || !story.is_own) return;

  clearTimeout(_svTimer); // Pause auto-advance while viewing

  const sheet = document.getElementById('sv-viewers-sheet');
  sheet.classList.add('open');

  try {
    const r = await fetch('/api/story/' + story.id + '/viewers');
    const d = await r.json();
    if (d.success) {
      document.getElementById('sv-viewer-count').textContent =
        d.view_count + (d.view_count === 1 ? ' viewer' : ' viewers');
      const list = document.getElementById('sv-viewers-list');
      if (!d.viewers.length) {
        list.innerHTML = '<div style="padding:24px;text-align:center;color:rgba(255,255,255,.4);font-size:13px">No views yet</div>';
      } else {
        list.innerHTML = d.viewers.map(v => {
          const av = v.avatar_url
            ? `<img src="${v.avatar_url}" style="width:38px;height:38px;border-radius:50%;object-fit:cover">`
            : `<div style="width:38px;height:38px;border-radius:50%;background:rgba(127,90,240,.6);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff">${(v.display_name||v.username||'?')[0].toUpperCase()}</div>`;
          const rxBadge = v.reaction
            ? `<span style="font-size:22px;margin-left:auto;flex-shrink:0">${v.reaction}</span>`
            : `<span style="font-size:11px;color:rgba(255,255,255,.3);margin-left:auto">Viewed</span>`;
          const verBadge = v.is_verified
            ? `<span class="badge-verified tier-${v.verified_tier||'blue'}" style="width:14px;height:14px;margin-left:3px;vertical-align:middle;flex-shrink:0"><svg class=\"badge-shell\" viewBox=\"0 0 22 22\" fill=\"currentColor\"><path d=\"M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568-.54.354-.969.854-1.24 1.44-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567.539-.354.969-.854 1.24-1.44.608.222 1.267.272 1.902.14.635-.13 1.22-.436 1.69-.882.445-.47.749-1.055.878-1.688.13-.633.08-1.29-.144-1.896.587-.274 1.087-.705 1.443-1.245.356-.54.555-1.17.574-1.817z\"/></svg><svg class=\"badge-check\" viewBox=\"0 0 10 10\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"2 5.5 4.2 7.5 8 3\"/></svg></span>`
            : '';
          return `<div style="display:flex;align-items:center;gap:10px;padding:10px 16px">
            ${av}
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:13.5px;color:#fff;display:flex;align-items:center">${escapeHtml(v.display_name||v.username)}${verBadge}</div>
              <div style="font-size:12px;color:rgba(255,255,255,.5)">@${escapeHtml(v.username)}</div>
            </div>
            ${rxBadge}
          </div>`;

        }).join('');
      }
    }
  } catch (_) {}
}
window.openViewers = openViewers;

function closeViewers() {
  document.getElementById('sv-viewers-sheet').classList.remove('open');
  // Resume auto-advance
  _showCurrentStory();
}
window.closeViewers = closeViewers;

/* ── Story reactions ─────────────────────────────────────────────────────── */

/* Tap heart = send ❤️ · Long-press heart = full emoji picker */
function svSendHeart() {
  const btn = document.getElementById('sv-heart-btn');
  const sid = btn && btn.dataset.storyId;
  if (!sid) return;
  /* Visual feedback */
  btn.classList.remove('heartpop');
  void btn.offsetWidth; /* reflow to restart animation */
  btn.classList.add('reacted', 'heartpop');
  const svg = document.getElementById('sv-heart-svg');
  if (svg) { svg.setAttribute('fill', '#f91880'); svg.setAttribute('stroke', '#f91880'); }
  sendStoryReaction(parseInt(sid), '❤️');
}
window.svSendHeart = svSendHeart;

/* Wire up the heart button: tap → svSendHeart, long-press → full picker */
(function() {
  function bindHeartBtn() {
    const btn = document.getElementById('sv-heart-btn');
    if (!btn || btn.dataset.heartBound) return;
    btn.dataset.heartBound = '1';
    let holdT = null;
    let _didLongPress = false;
    btn.addEventListener('pointerdown', function(e) {
      _didLongPress = false;
      holdT = setTimeout(function() {
        holdT = null;
        _didLongPress = true;
        const sid = btn.dataset.storyId;
        if (sid) openStoryEmojiPicker(parseInt(sid), btn);
      }, 500);
    });
    btn.addEventListener('pointerup', function() {
      if (holdT) { clearTimeout(holdT); holdT = null; }
    });
    btn.addEventListener('pointerleave', function() {
      if (holdT) { clearTimeout(holdT); holdT = null; }
    });
    btn.addEventListener('click', function(e) {
      if (_didLongPress) { _didLongPress = false; return; } /* skip click after long-press */
      svSendHeart();
    });
  }
  /* Try binding immediately, and also after each story open */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bindHeartBtn);
  } else { bindHeartBtn(); }
  /* Re-bind after story overlay opens (heart btn might not exist yet on first run) */
  const _origOpen = window.openStoryGroup;
  window.openStoryGroup = function() {
    _origOpen.apply(this, arguments);
    setTimeout(bindHeartBtn, 50);
  };
})();

async function sendStoryReaction(storyId, emoji) {
  try {
    const r = await fetch('/api/story/' + storyId + '/react', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({emoji})
    });
    const d = await r.json();
    if (d.success) {
      /* Float the emoji up */
      const overlay = document.getElementById('story-overlay');
      const floater = document.createElement('div');
      floater.textContent = emoji;
      floater.style.cssText = 'position:absolute;bottom:120px;left:50%;font-size:38px;' +
        'transform:translateX(-50%);animation:floatUp 1.2s ease forwards;pointer-events:none;z-index:9999';
      overlay.appendChild(floater);
      setTimeout(function() { floater.remove(); }, 1300);
      /* Advance after short delay */
      setTimeout(nextStory, 900);
    }
  } catch(_) {}
}
window.sendStoryReaction = sendStoryReaction;

const FULL_STORY_EMOJI = ['❤️','😂','😮','😢','🔥','👏','💯','🎉','😍','🥹','🫶','💪','😭','🤩','😅','🤬'];
function openStoryEmojiPicker(storyId, anchor) {
  let picker = document.getElementById('story-emoji-picker');
  if (!picker) {
    picker = document.createElement('div');
    picker.id = 'story-emoji-picker';
    picker.style.cssText = 'position:fixed;z-index:9999;background:rgba(18,18,28,.95);' +
      'border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:10px;' +
      'display:flex;flex-wrap:wrap;gap:4px;width:240px;backdrop-filter:blur(16px)';
    FULL_STORY_EMOJI.forEach(e => {
      const b = document.createElement('button');
      b.textContent = e;
      b.style.cssText = 'font-size:22px;border:none;background:none;cursor:pointer;padding:4px;border-radius:8px';
      b.onclick = () => { sendStoryReaction(storyId, e); picker.remove(); };
      picker.appendChild(b);
    });
    document.body.addEventListener('click', function cp(ev) {
      if (!picker.contains(ev.target) && ev.target !== anchor) { picker.remove(); document.body.removeEventListener('click',cp); }
    });
  }
  const rect = anchor.getBoundingClientRect();
  picker.style.top  = (rect.top - 200) + 'px';
  picker.style.left = Math.max(10, rect.left - 100) + 'px';
  document.body.appendChild(picker);
}
window.openStoryEmojiPicker = openStoryEmojiPicker;


// Touch gestures: hold-to-pause + swipe-up-to-viewers
(function() {
  let startY   = 0;
  let holdT    = null;
  let holding  = false;
  const overlay = document.getElementById('story-overlay');

  overlay.addEventListener('touchstart', function(e) {
    if (e.target.closest('button, a')) return; // ignore taps on interactive elements
    startY  = e.touches[0].clientY;
    holding = false;
    holdT   = setTimeout(function() {
      holding = true;
      holdT   = null;
      if (!_svPaused) { _svPaused = true; _applyPauseState(); }
    }, 150);
  }, {passive: true});

  overlay.addEventListener('touchmove', function(e) {
    if (holdT && Math.abs(startY - e.touches[0].clientY) > 10) {
      clearTimeout(holdT); holdT = null; /* cancel hold if swiping */
    }
  }, {passive: true});

  overlay.addEventListener('touchend', function(e) {
    if (holdT) { clearTimeout(holdT); holdT = null; }

    if (holding) {
      /* Finger lifted after hold — resume */
      holding  = false;
      _svPaused = false;
      _applyPauseState();
      return;
    }

    /* Swipe up to view story viewers (owner only) */
    const grp   = _storyGroups[_svGroupIdx];
    const story = grp && grp.stories[_svStoryIdx];
    if (!story || !story.is_own) return;
    const dy = startY - e.changedTouches[0].clientY;
    if (dy > 60) openViewers();
  }, {passive: true});
})();
</script>
