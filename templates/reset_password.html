<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>Reset Password — DUYS Boost</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  min-height: 100vh; background: #080a12;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-body, system-ui, sans-serif);
  padding: 24px 16px;
}
.orb { position: fixed; border-radius: 50%; filter: blur(80px);
       opacity: 0.5; pointer-events: none; z-index: 0; }
.orb-1 { width: 500px; height: 500px;
         background: radial-gradient(circle,#7f5af0,transparent 70%);
         top:-120px; left:-80px; }
.orb-2 { width: 380px; height: 380px;
         background: radial-gradient(circle,#2cb67d,transparent 70%);
         bottom:-80px; right:-60px; }
.glass-wrap { position:relative; z-index:10; width:100%; max-width:420px; }
.glass-card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(32px) saturate(1.6);
  -webkit-backdrop-filter: blur(32px) saturate(1.6);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 24px; padding: 36px 32px;
  box-shadow: 0 32px 80px rgba(0,0,0,.55), 0 8px 24px rgba(127,90,240,.12);
}
.field-label { display:block; font-size:11.5px; font-weight:700;
  letter-spacing:.05em; text-transform:uppercase;
  color:rgba(255,255,255,.45); margin-bottom:6px; }
.field-input {
  width:100%; padding:11px 14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:11px; color:#fff; font-size:14px;
  font-family:inherit; outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.field-input:focus { border-color:rgba(127,90,240,.7); box-shadow:0 0 0 3px rgba(127,90,240,.15); }
.field-input::placeholder { color:rgba(255,255,255,.25); }
.pw-wrap { position:relative; }
.pw-wrap .field-input { padding-right:42px; }
.pw-toggle {
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:rgba(255,255,255,.3); cursor:pointer;
  padding:6px; display:flex; align-items:center; border-radius:6px;
  transition:color .15s, background .15s;
}
.pw-toggle:hover { color:rgba(255,255,255,.75); background:rgba(255,255,255,.06); }
.pw-toggle svg { width:18px; height:18px; display:block; }
.eye-off { display:none; }
.pw-toggle.shown .eye-on  { display:none; }
.pw-toggle.shown .eye-off { display:block; }
.auth-submit {
  width:100%; padding:13px;
  background:linear-gradient(135deg,#7f5af0,#5a3fc0);
  border:none; border-radius:12px; color:#fff;
  font-size:15px; font-weight:700; font-family:inherit;
  cursor:pointer; box-shadow:0 4px 20px rgba(127,90,240,.4);
  transition:opacity .2s;
}
.auth-submit:hover { opacity:.9; }
.auth-submit:disabled { opacity:.55; cursor:not-allowed; }
.error-box {
  background:rgba(239,69,101,.1); border:1px solid rgba(239,69,101,.3);
  border-radius:10px; padding:10px 14px; display:none; margin-bottom:14px;
}
.error-box.show { display:block; }
.error-box li { color:#ff7c9c; font-size:13px; list-style:none; padding:2px 0; }
.pw-strength { display:flex; gap:4px; margin-top:6px; }
.pw-strength-bar { flex:1; height:3px; border-radius:99px;
  background:rgba(255,255,255,.1); transition:background .3s; }
.pw-strength-bar.weak   { background:#e53e3e; }
.pw-strength-bar.fair   { background:#f4c94e; }
.pw-strength-bar.good   { background:#2cb67d; }
.pw-strength-bar.strong { background:#7f5af0; }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="glass-wrap">
  <div class="glass-card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:52px;height:52px;background:linear-gradient(135deg,#7f5af0,#5a3fc0);
                  border-radius:14px;display:inline-flex;align-items:center;justify-content:center;
                  font-size:24px;margin-bottom:12px">🔑</div>
      <div style="font-size:22px;font-weight:800;color:#fff;letter-spacing:-.02em">Set new password</div>
      <div style="font-size:13px;color:rgba(255,255,255,.45);margin-top:4px">
        Choose a strong password for your account.
      </div>
    </div>

    <div class="error-box" id="rp-error"><ul></ul></div>

    <form id="rp-form" novalidate style="display:flex;flex-direction:column;gap:16px">
      <input type="hidden" name="token" value="{{ token }}">
      <input type="hidden" name="uid"   value="{{ uid }}">

      <div>
        <label class="field-label">New password</label>
        <div class="pw-wrap">
          <input class="field-input" id="rp-pw" name="password"
                 type="password" autocomplete="new-password"
                 placeholder="Min. 8 characters" minlength="8" required
                 oninput="checkPwStrength(this.value)">
          <button type="button" class="pw-toggle" onclick="togglePw('rp-pw',this)" aria-label="Show password">
            <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-10-7-10-7a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 10 7 10 7a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <div class="pw-strength">
          <div class="pw-strength-bar" id="pw-bar-1"></div>
          <div class="pw-strength-bar" id="pw-bar-2"></div>
          <div class="pw-strength-bar" id="pw-bar-3"></div>
          <div class="pw-strength-bar" id="pw-bar-4"></div>
        </div>
      </div>

      <div>
        <label class="field-label">Confirm password</label>
        <div class="pw-wrap">
          <input class="field-input" id="rp-confirm" name="confirm_password"
                 type="password" autocomplete="new-password"
                 placeholder="Repeat password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('rp-confirm',this)" aria-label="Show password">
            <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-10-7-10-7a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 10 7 10 7a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="auth-submit" id="rp-btn">
        Set new password →
      </button>
    </form>

    <div style="text-align:center;margin-top:18px">
      <a href="{{ url_for('auth.login') }}"
         style="font-size:13px;color:rgba(127,90,240,.8);text-decoration:none;font-weight:600">
        ← Back to sign in
      </a>
    </div>
  </div>
</div>

<script>
const CSRF = document.querySelector('meta[name="csrf-token"]')?.content || '';

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  if (btn) btn.classList.toggle('shown', show);
}

function checkPwStrength(pw) {
  const score = [pw.length>=8, /[A-Z]/.test(pw), /[0-9]/.test(pw),
    /[^A-Za-z0-9]/.test(pw)||pw.length>=14].filter(Boolean).length;
  const levels = ['','weak','fair','good','strong'];
  for (let i=1;i<=4;i++) {
    const b = document.getElementById('pw-bar-'+i);
    if (b) b.className = 'pw-strength-bar ' + (i<=score ? levels[score] : '');
  }
}

document.getElementById('rp-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('rp-btn');
  const errBox = document.getElementById('rp-error');
  errBox.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Saving…';

  const fd = new FormData(this);
  const r  = await fetch('', { method:'POST', headers:{'X-CSRF-Token':CSRF}, body:fd })
               .catch(() => null);
  if (!r) { btn.disabled=false; btn.textContent='Set new password →'; return; }
  const d = await r.json();
  if (d.success) {
    btn.textContent = '✓ Done! Redirecting…';
    setTimeout(() => location.href = d.redirect, 1000);
  } else {
    errBox.querySelector('ul').innerHTML =
      (d.errors||['Something went wrong.']).map(e=>`<li>⚠ ${e}</li>`).join('');
    errBox.classList.add('show');
    btn.disabled=false; btn.textContent='Set new password →';
  }
});
</script>
</body>
</html>
